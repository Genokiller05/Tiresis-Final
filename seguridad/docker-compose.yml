services:
  backend:
    build: .
    container_name: tiresis-backend
    command: npm run start:server
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build: .
    container_name: tiresis-frontend
    command: npm start -- --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - ./src:/app/src
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
