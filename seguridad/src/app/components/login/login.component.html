<div
  class="min-h-screen bg-[#0a192f] text-gray-100 flex flex-col items-center justify-center font-sans relative overflow-hidden p-4">

  <!-- Background Effects -->
  <div
    class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-blue-900/10 rounded-full blur-[100px] pointer-events-none">
  </div>
  <div
    class="absolute bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-indigo-900/10 rounded-full blur-[100px] pointer-events-none">
  </div>

  <!-- Back Button -->
  <button (click)="goBack()" title="Regresar"
    class="fixed top-5 left-5 z-50 flex items-center justify-center w-10 h-10 rounded-full bg-white/5 border border-blue-500/20 text-gray-400 hover:text-white hover:bg-blue-600/20 hover:border-blue-500/50 backdrop-blur-sm transition-all duration-200 hover:scale-110 active:scale-95 shadow-lg">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
      stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <!-- Main Card -->
  <div
    class="w-full max-w-md bg-[#0f203c] border border-blue-500/10 rounded-2xl shadow-2xl p-8 animate-fade-in relative overflow-hidden">

    <!-- Decorative Gradients -->
    <div class="absolute top-0 right-0 w-24 h-24 bg-blue-500/10 rounded-bl-full blur-[40px] pointer-events-none"></div>
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-500"></div>

    <!-- Header / Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-4">
        <div
          class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/50">
          <span class="font-bold text-white text-xl">T</span>
        </div>
        <span class="text-2xl font-bold tracking-wider text-white">TIRESIS</span>
      </div>
      <h2 class="text-2xl font-bold text-white">Bienvenido de nuevo</h2>
      <p class="text-gray-400 text-sm mt-1">Ingresa tus credenciales para acceder</p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="login()" class="space-y-5">

      <div>
        <label for="email" class="block text-gray-400 text-xs font-bold uppercase mb-1 ml-1">Correo Corporativo</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-500 group-focus-within:text-blue-400 transition" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
            </svg>
          </div>
          <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="admin@empresa.com"
            class="w-full bg-[#0a192f] border border-gray-700 rounded-xl pl-10 pr-4 py-3 text-white placeholder-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition shadow-inner">
        </div>
      </div>

      <div>
        <label for="password" class="block text-gray-400 text-xs font-bold uppercase mb-1 ml-1">Contraseña</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-500 group-focus-within:text-blue-400 transition" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input type="password" id="password" name="password" [(ngModel)]="password" required placeholder="••••••••"
            class="w-full bg-[#0a192f] border border-gray-700 rounded-xl pl-10 pr-4 py-3 text-white placeholder-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition shadow-inner">
        </div>
      </div>

      <div *ngIf="error"
        class="p-3 bg-red-900/20 border border-red-500/20 rounded-lg text-red-300 text-sm flex items-center gap-2 animate-shake">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        {{ error }}
      </div>

      <button type="submit" [disabled]="isLoading"
        class="w-full py-3.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-lg shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
        <span *ngIf="isLoading"
          class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
        {{ isLoading ? 'Verificando...' : 'Iniciar Sesión' }}
      </button>

      <div class="text-center mt-6 pt-4 border-t border-gray-800">
        <p class="text-sm text-gray-400">¿Aún no tienes cuenta?</p>
        <a (click)="goToRegister()"
          class="inline-block mt-2 text-blue-400 hover:text-blue-300 font-medium transition hover:underline cursor-pointer">
          Registrar mi Empresa
        </a>
      </div>
    </form>
  </div>
</div>

<style>
  .animate-fade-in {
    animation: fade-in 0.5s ease-out forwards;
  }

  .animate-shake {
    animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
  }

  @keyframes fade-in {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes shake {

    10%,
    90% {
      transform: translate3d(-1px, 0, 0);
    }

    20%,
    80% {
      transform: translate3d(2px, 0, 0);
    }

    30%,
    50%,
    70% {
      transform: translate3d(-4px, 0, 0);
    }

    40%,
    60% {
      transform: translate3d(4px, 0, 0);
    }
  }
</style>
