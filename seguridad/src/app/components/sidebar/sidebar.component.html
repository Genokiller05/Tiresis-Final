<!-- Sidebar (Static & Icon-only) -->
<aside
  class="w-20 bg-white dark:bg-gray-800 flex flex-col items-center py-6 shadow-md z-10 border-r border-gray-200 dark:border-gray-700 h-screen fixed">
  <!-- Brand Icon -->
  <div class="mb-8 text-purple-600 dark:text-purple-500">
    <span class="material-icons !text-4xl">security</span>
  </div>

  <!-- Navigation -->
  <!-- Navigation -->
  <nav class="flex flex-col w-full px-2 space-y-4">

    <!-- Alertas -->
    <a title="Alertas" href="#" (click)="navigateTo($event, '/dashboard/alertas')"
      class="flex justify-center p-3 rounded-xl transition-all duration-200 group relative"
      [ngClass]="isActive('/dashboard/alertas') ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-purple-600 dark:hover:text-purple-400'">
      <span class="material-icons text-2xl">notifications_active</span>
    </a>

    <!-- Registros -->
    <a title="Registros" href="#" (click)="navigateTo($event, '/dashboard/registros')"
      class="flex justify-center p-3 rounded-xl transition-all duration-200"
      [ngClass]="isActive('/dashboard/registros') ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-purple-600 dark:hover:text-purple-400'">
      <span class="material-icons text-2xl">assignment_ind</span>
    </a>

    <!-- Buscar Guardias (Home) -->
    <a title="Buscar Personal" href="#" (click)="navigateTo($event, '/dashboard/home')"
      class="flex justify-center p-3 rounded-xl transition-all duration-200"
      [ngClass]="isActive('/dashboard/home') ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-purple-600 dark:hover:text-purple-400'">
      <span class="material-icons text-2xl">person_search</span>
    </a>

    <!-- Mapa -->
    <a title="Mapa" href="#" (click)="navigateTo($event, '/dashboard/mapa')"
      class="flex justify-center p-3 rounded-xl transition-all duration-200"
      [ngClass]="isActive('/dashboard/mapa') ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-purple-600 dark:hover:text-purple-400'">
      <span class="material-icons text-2xl">map</span>
    </a>

    <!-- Entradas/Salidas -->
    <a title="Entradas y Salidas" href="#" (click)="navigateTo($event, '/dashboard/entradas-salidas')"
      class="flex justify-center p-3 rounded-xl transition-all duration-200"
      [ngClass]="isActive('/dashboard/entradas-salidas') ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-purple-600 dark:hover:text-purple-400'">
      <span class="material-icons text-2xl">swap_horiz</span>
    </a>

    <!-- Cámaras -->
    <a title="Cámaras" href="#" (click)="navigateTo($event, '/dashboard/camaras')"
      class="flex justify-center p-3 rounded-xl transition-all duration-200"
      [ngClass]="isActive('/dashboard/camaras') ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-purple-600 dark:hover:text-purple-400'">
      <span class="material-icons text-2xl">videocam</span>
    </a>

  </nav>

  <!-- Bottom: Profile/Settings Link (Optional, using current user logic if exists or just static for now) -->
  <div class="mt-auto mb-6">
    <a title="Perfil Admin" href="#" (click)="navigateTo($event, '/dashboard/admin-profile')"
      class="flex justify-center p-3 rounded-xl transition-all duration-200"
      [ngClass]="isActive('/dashboard/admin-profile') ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-purple-600 dark:hover:text-purple-400'">
      <span class="material-icons text-2xl">settings</span>
    </a>
  </div>
</aside>
